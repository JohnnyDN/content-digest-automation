services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_digest_net

  n8n:
      image: n8nio/n8n:latest
      restart: unless-stopped
      ports:
        - "127.0.0.1:5678:5678"
      environment:
        # Auth
        N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
        N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
        N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
        
        # URL Configuration (for OAuth callbacks)
        WEBHOOK_URL: https://n8n.walterlabs.net/
        N8N_EDITOR_BASE_URL: https://n8n.walterlabs.net
        
        # Config
        GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
        
        # Database
        DB_TYPE: postgresdb
        DB_POSTGRESDB_HOST: postgres
        DB_POSTGRESDB_PORT: 5432
        DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
        DB_POSTGRESDB_USER: ${POSTGRES_USER}
        DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
        
        # API Key
        ANTHROPIC_API_KEY: ${CLAUDE_API_KEY}

        # Execution pruning
        EXECUTIONS_DATA_PRUNE: "true"
        EXECUTIONS_DATA_MAX_AGE: 720        # 30 days in hours
        EXECUTIONS_DATA_PRUNE_MAX_COUNT: 10000  # Max executions to keep
      
      volumes:
        - n8n_data:/home/node/.n8n
      depends_on:
        postgres:
          condition: service_healthy
      networks:
        - ai_digest_net

volumes:
  postgres_data:
  n8n_data:

networks:
  ai_digest_net:
    driver: bridge